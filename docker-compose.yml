version: '3.8'

services:
  backend:
    build:
      context: ./voyage-backend
      dockerfile: Dockerfile
    container_name: voyage-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - NODE_ENV=production
      # Pulling secrets from host environment or specify below:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      # Make sure your backend has OPENROUTER_API_KEY exported if needed
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voyage-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
