server {
    listen 80;

    # Where the root here is configured to nginx default html folder
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Any route that doesn't have a file extension (e.g. /about, /packages)
    # is routed to index.html so React Router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Node.js backend container
    # Assuming backend runs on port 5001 as defined in docker-compose
    location /api/ {
        proxy_pass http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
